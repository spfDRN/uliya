<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методические материалы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family:Inter,sans-serif;
            background:#f4f6fb;
            padding:40px;
            margin:0;
        }
        h1{
            text-align:center;
            margin-bottom:40px;
            font-size:34px;
            background:linear-gradient(120deg,#6366f1,#8b5cf6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        h2{
            margin:50px 0 20px;
        }

        /* Блок картинок */
        .images{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
            transition:0.3s;
            text-align:center;
            cursor:pointer;
        }

        .card:hover{
            transform:translateY(-6px);
            box-shadow:0 12px 25px rgba(0,0,0,0.15);
        }

        .card img{
            width:100%;
            height:auto; /* полностью отображается */
            display:block;
        }

        .card h3{
            padding:15px;
            font-size:18px;
        }

        /* Модальное окно */
        .modal{
            display:none;
            position:fixed;
            z-index:1000;
            left:0;
            top:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.8);
            justify-content:center;
            align-items:center;
        }

        .modal img{
            max-width:90%;
            max-height:90%;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .modal.show{
            display:flex;
            animation:fadeIn 0.3s ease;
        }

        @keyframes fadeIn{
            from{opacity:0;}
            to{opacity:1;}
        }

        /* Файлы */
        .files{
            margin-top:30px;
        }

        .file{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:white;
            padding:15px 20px;
            border-radius:10px;
            margin-bottom:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.06);
        }

        .download{
            background:#6366f1;
            color:white;
            text-decoration:none;
            padding:8px 16px;
            border-radius:6px;
            transition:0.2s;
        }

        .download:hover{
            background:#4f46e5;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Методическая копилка</h1>

    <h2>Разделы</h2>

    <div class="images">
        <div class="card"><img src="../assets/photo/trash/photo_1_2026-03-12_01-34-24.jpg" alt="ЕГЭ"></div>
        <div class="card"><img src="../assets/photo/trash/photo_2_2026-03-12_01-34-24.jpg" alt="ОГЭ"></div>
        <div class="card"><img src="../assets/photo/trash/photo_3_2026-03-12_01-34-24.jpg" alt="Рабочие листы"></div>
        <div class="card"><img src="../assets/photo/trash/photo_4_2026-03-12_01-34-24.jpg" alt="Лексика"></div>
    </div>

    <h2>Файлы для скачивания</h2>
    <div class="files">
        <div class="file"><span>Reading Practice 1</span><a href="files/reading1.docx" download class="download">Скачать</a></div>
        <div class="file"><span>Grammar Exercises</span><a href="files/grammar.docx" download class="download">Скачать</a></div>
        <div class="file"><span>Vocabulary List</span><a href="files/vocabulary.docx" download class="download">Скачать</a></div>
        <div class="file"><span>Practice Test</span><a href="files/test.docx" download class="download">Скачать</a></div>
    </div>

</div>

<!-- Модальное окно -->
<div class="modal" id="modal">
    <img src="" alt="Увеличенное фото" id="modal-img">
</div>

<script>
    // Открытие модального окна
    const cards = document.querySelectorAll('.card img');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    cards.forEach(card => {
        card.addEventListener('click', () => {
            modalImg.src = card.src;
            modal.classList.add('show');
        });
    });

    // Закрытие при клике на фон
    modal.addEventListener('click', () => {
        modal.classList.remove('show');
    });
</script>

</body>
</html>
