<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Учебные материалы</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Inter,sans-serif;
            background:#f4f6fb;
            padding:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:50px;
            border-radius:14px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        h1{
            text-align:center;
            margin-bottom:40px;
            font-size:32px;
            background:linear-gradient(120deg,#6366f1,#8b5cf6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .material{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#f7f8ff;
            padding:18px 20px;
            border-radius:10px;
            margin-bottom:12px;
            border-left:4px solid #6366f1;
        }

        .file-name{
            font-weight:500;
        }

        .download-btn{
            text-decoration:none;
            padding:8px 16px;
            background:#6366f1;
            color:white;
            border-radius:6px;
            transition:0.2s;
        }

        .download-btn:hover{
            background:#4f46e5;
        }

        .info{
            background:#fff8e1;
            padding:15px;
            border-radius:8px;
            margin-bottom:30px;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Учебные материалы</h1>

    <div class="info">
        📌 Нажмите кнопку <b>Скачать</b>, чтобы загрузить файл.
    </div>

    <!-- МАТЕРИАЛ 1 -->

    <div class="material">

        <div class="file-name">
            1 Вариант
        </div>

        <a class="download-btn" href="doc/EGE1 (4).pdf" download>
            Скачать
        </a>

    </div>

    <!-- МАТЕРИАЛ 2 -->

    <div class="material">

        <div class="file-name">
            2 Вариант
        </div>

        <a class="download-btn" href="doc/EGE1 (3).pdf" download>
            Скачать
        </a>

    </div>

    <!-- МАТЕРИАЛ 3 -->

    <div class="material">

        <div class="file-name">
            3 Вариант
        </div>

        <a class="download-btn" href="doc/EGE1 (2).pdf" download>
            Скачать
        </a>
    </div>
    <div class="material">

        <div class="file-name">
            4 Вариант
        </div>

        <a class="download-btn" href="doc/EGE1 (1).pdf" download>
            Скачать
        </a>
    </div>
    <div class="material">

        <div class="file-name">
            5 Вариант
        </div>

        <a class="download-btn" href="doc/EGE1 (5).pdf" download>
            Скачать
        </a>
    </div>

</div>

</body>
</html>
